name: CI Pipeline

on:
  push:
  pull_request:

jobs:
  frontend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install frontend deps
        run: cd task-frontend && npm install

      - name: Lint frontend
        run: cd task-frontend && npm run lint

      - name: Build frontend
        run: cd task-frontend && npm run build

     
      - name: Test frontend
        run: cd task-frontend && npm run test

  backend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install backend deps
        run: cd task-backend && npm install

      - name: Lint backend
        run: cd task-backend && npm run lint || echo "No lint script"

    
      - name: Build backend
        run: cd task-backend && npm run build

    
      - name: Test backend
        run: cd task-backend && npm run test